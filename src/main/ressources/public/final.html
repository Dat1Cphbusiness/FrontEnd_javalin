<body>

<div class = "container">

<script>
const ride = {
name: sessionStorage.getItem("name"),
role: sessionStorage.getItem("role"),
date: sessionStorage.getItem("date"),
to: sessionStorage.getItem("to"),
from: sessionStorage.getItem("from"),
smoking: sessionStorage.getItem("smoking"),
comments: sessionStorage.getItem("comments"),

};
console.log(ride);

const response = await fetch("/rides", {
method: "POST",
headers: { "Content-Type": "application/json" },
body: JSON.stringify(ride)
});
console.log(response.status); // 201 hvis alt gik godt
if(response.status=="201"){
const response = document.querySelector(".container");
    response.innerHTML=`<h1> Tak! Din anmodning er modtaget.<h1>`;
    }
</script>
